name: Windows CI

on:
  pull_request:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: windows-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-and-package:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate pull request title
        if: ${{ github.event_name == 'pull_request' }}
        shell: pwsh
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          $pattern = '^(feat|fix|docs|chore|refactor|perf|test|build|ci|revert|style)(\([a-z0-9._/-]+\))?!?: .+$'
          if ($env:PR_TITLE -notmatch $pattern) {
            throw "Pull request title must use Conventional Commits, for example: feat: add transcript search"
          }

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.6.0
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build Windows installer
        run: pnpm package:win

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: local-whisper-studio-windows-${{ github.sha }}
          path: release/Local Whisper Studio Setup *.exe
          if-no-files-found: error
          retention-days: 14
