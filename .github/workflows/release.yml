name: Release

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release_please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      release_sha: ${{ steps.release.outputs.sha }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}

    steps:
      - name: Create or update release pull request
        id: release
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.RELEASE_AUTOMATION_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  package_release:
    needs: release_please
    if: ${{ needs.release_please.outputs.release_created == 'true' }}
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Check out released commit
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.release_please.outputs.release_sha }}

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.6.0
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build Windows installer
        run: pnpm package:win

      - name: Generate SHA-256 checksum
        shell: pwsh
        env:
          RELEASE_VERSION: ${{ needs.release_please.outputs.version }}
        run: |
          $installerPath = "release/Local Whisper Studio Setup $env:RELEASE_VERSION.exe"
          if (-not (Test-Path -LiteralPath $installerPath -PathType Leaf)) {
            throw "Windows installer was not generated: $installerPath"
          }
          $installer = Get-Item -LiteralPath $installerPath
          $hash = (Get-FileHash -LiteralPath $installer.FullName -Algorithm SHA256).Hash.ToLowerInvariant()
          "$hash  $($installer.Name)" | Set-Content -LiteralPath "$($installer.FullName).sha256" -Encoding ascii

      - name: Upload release assets
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ needs.release_please.outputs.tag_name }}
          RELEASE_VERSION: ${{ needs.release_please.outputs.version }}
        run: |
          $installer = Get-Item -LiteralPath "release/Local Whisper Studio Setup $env:RELEASE_VERSION.exe"
          gh release upload $env:RELEASE_TAG `
            $installer.FullName `
            "$($installer.FullName).sha256" `
            --clobber

      - name: Publish GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ needs.release_please.outputs.tag_name }}
        run: gh release edit $env:RELEASE_TAG --draft=false --latest
